<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#9B5CF5"/>
    </linearGradient>
  </defs>
  <!-- rounded background -->
  <rect width="64" height="64" rx="14" fill="#0a0a14"/>

  <!-- Left bar -->
  <rect x="6" y="6" width="9" height="52" rx="3" fill="url(#fg)"/>
  <!-- Upper bump -->
  <path d="M15,6 L32,6 Q43,6 43,16 Q43,26 32,26 L15,26 Z" fill="url(#fg)"/>
  <path d="M20,11 L30,11 Q37,11 37,16 Q37,21 30,21 L20,21 Z" fill="#0a0a14"/>
  <!-- Lower bump -->
  <path d="M15,30 L34,30 Q46,30 46,42 Q46,58 34,58 L15,58 Z" fill="url(#fg)"/>
  <path d="M20,35 L32,35 Q40,35 40,42 Q40,52 32,52 L20,52 Z" fill="#0a0a14"/>
  <!-- ECG strip -->
  <rect x="2" y="25" width="52" height="9" fill="#0a0a14"/>
  <!-- ECG line -->
  <path d="M2,29.5 L12,29.5 L16,14 L22,45 L26,20 L30,29.5 L56,29.5"
        stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>