<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none">
  <defs>
    <linearGradient id="g-full" x1="0" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="30%"  stop-color="#4DB8FF"/>
      <stop offset="65%"  stop-color="#8B78FF"/>
      <stop offset="100%" stop-color="#9B5CF5"/>
    </linearGradient>
    <linearGradient id="g-icon" x1="0" y1="0" x2="62" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B72FF"/>
    </linearGradient>
  </defs>

  <!-- ── B letterform ── -->
  <!-- Left vertical bar -->
  <rect x="2" y="3" width="10" height="62" rx="3.5" fill="url(#g-icon)"/>

  <!-- Upper bump (outer) -->
  <path d="M12,3 L34,3 Q49,3 49,17.5 Q49,31 34,31 L12,31 Z" fill="url(#g-icon)"/>
  <!-- Upper bump (inner hollow — dark) -->
  <path d="M18,9 L32,9 Q42,9 42,17.5 Q42,25 32,25 L18,25 Z" fill="#0a0a14"/>

  <!-- Lower bump (outer, slightly larger) -->
  <path d="M12,37 L36,37 Q53,37 53,51.5 Q53,65 36,65 L12,65 Z" fill="url(#g-icon)"/>
  <!-- Lower bump (inner hollow — dark) -->
  <path d="M18,43 L34,43 Q46,43 46,51.5 Q46,59 34,59 L18,59 Z" fill="#0a0a14"/>

  <!-- ECG strip — cuts through B's midpoint -->
  <rect x="0" y="29" width="62" height="10" fill="#0a0a14"/>

  <!-- ECG / heartbeat waveform line -->
  <path d="M 0,34 L 9,34 L 13,16 L 20,52 L 24,24 L 28,34 L 62,34"
        stroke="url(#g-icon)" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Dash connector ── -->
  <line x1="66" y1="34" x2="78" y2="34"
        stroke="url(#g-full)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ── BE4T wordmark ── -->
  <text x="84" y="53"
        font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, Arial, sans-serif"
        font-size="50" font-weight="900" letter-spacing="-1.5"
        fill="url(#g-full)">BE4T</text>
</svg>
